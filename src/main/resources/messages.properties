# Base (English) error messages. Codes match GlobalExceptionHandler / AppException.

# Auth
INVALID_CREDENTIALS=Email or password is incorrect
INVALID_INVITE_CODE=Invalid or expired invite code
EMAIL_ALREADY_USED=Email is already registered
PHONE_ALREADY_USED=Phone is already registered
ACCOUNT_LOCKED=Account is locked
SESSION_EXPIRED=Session expired, please login again
UNAUTHORIZED=Authentication required
INVALID_TOKEN=Invalid or revoked token
INVALID_TOKEN_TYPE=Invalid token type
LOGOUT_FAILED=Logout failed: token missing or invalid
FORBIDDEN=Access denied
BAD_REQUEST=Bad request
VALIDATION_ERROR=Validation failed
INTERNAL_SERVER_ERROR=Internal server error
SERVICE_UNAVAILABLE=Service is temporarily unavailable

# Venue / Table
VENUE_NOT_FOUND=Selected venue not found
TABLE_NOT_FOUND=Table not found
VENUE_NUMBER_TAKEN=This venue number is already taken
TABLE_NUMBER_TAKEN=This table number already exists in this venue
VENUE_HAS_TABLES=Venue has tables, delete them first
TABLE_HAS_ACTIVE_SESSION=Table has an active session

# Session
SESSION_NOT_FOUND=Session not found
SESSION_NOT_ACTIVE=Session is not active
SESSION_NOT_PAUSED=Session is not paused
SESSION_ALREADY_PAUSED=Session is already paused
SESSION_ALREADY_COMPLETED=Session is already completed
SESSION_ALREADY_CANCELLED=Session is already cancelled
CANCEL_WINDOW_EXPIRED=Cancel window has expired
INVALID_DISCOUNT=Discount must be between 0 and 100

# Reports
REPORT_NOT_FOUND=Report data not found
MANAGER_NOT_FOUND=Manager not found
NOT_ENOUGH_DATA=Not enough data for analysis

# Managers
HAS_ACTIVE_SESSION=Manager has active sessions, cannot remove

# Subscription
SUBSCRIPTION_REQUIRED=Subscription expired. Renew to continue using core features.
SUBSCRIPTION_NOT_FOUND=No subscription found for this account
NO_TABLES=No tables found. Add a table before subscribing.
INVALID_DURATION=Invalid subscription duration
PAYMENT_NOT_FOUND=Payment not found
PAYMENT_ALREADY_PROCESSED=Payment has already been processed
PAYMENT_PROVIDER_ERROR=Payment provider error
PRICING_MISMATCH=Pricing changed, please refresh
