spring:
  application:
    name: sport_manager

  datasource:
    url: jdbc:postgresql://localhost:5432/sport_manager
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080
