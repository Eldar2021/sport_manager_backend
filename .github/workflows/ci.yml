name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build (skip tests for now — see review/PLAN.md Faz 5)
        run: ./mvnw -B clean package -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: sportmanager-jar
          path: target/*.jar
          retention-days: 7

  docker:
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t sport-manager-backend:${{ github.sha }} .

      # TODO: push to registry once credentials are configured
