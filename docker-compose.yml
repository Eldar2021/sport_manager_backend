version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sport-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sport_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sport-manager-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sport_manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: "dev-only-please-rotate-in-prod-8fK29xLmQwPz91AaBcDeFgHi"
      JPA_DDL_AUTO: validate
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

volumes:
  pg_data:
